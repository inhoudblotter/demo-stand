version: "3.8"

x-api-base: &api-base
  networks:
    - traefik_public
    - postgres_demo
  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped

x-traefik-web: &traefik-web
  traefik.enable: "true"
  traefik.http.routers.${PROJECT_NAME}-web.rule: "Host(`${PROJECT_DOMAIN}`)"
  traefik.http.routers.${PROJECT_NAME}-web.entrypoints: "websecure"
  traefik.http.routers.${PROJECT_NAME}-web.tls.certresolver: "letsencrypt"
  traefik.http.services.${PROJECT_NAME}-web.loadbalancer.server.port: "3000"

x-traefik-api: &traefik-api
  traefik.enable: "true"
  traefik.http.routers.${PROJECT_NAME}-api.rule: "Host(`api.${PROJECT_DOMAIN}`)"
  traefik.http.routers.${PROJECT_NAME}-api.entrypoints: "websecure"
  traefik.http.routers.${PROJECT_NAME}-api.tls.certresolver: "letsencrypt"
  traefik.http.services.${PROJECT_NAME}-api.loadbalancer.server.port: "3000"

services:
  # Глобальный Traefik
  traefik:
    image: traefik:latest
    container_name: demo-traefik
    command:
      - --log.level=INFO
      - --api.dashboard=true
      - --api.insecure=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --accesslog=true
      - --accesslog.filepath=/var/log/traefik/access.log
      - --accesslog.format=json
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./acme.json:/letsencrypt/acme.json
      - ./logs/traefik:/var/log/traefik
    networks:
      - traefik_public
    restart: unless-stopped

  # Глобальный Postgres
  postgres:
    image: postgres:16-alpine
    container_name: demo-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_demo_data:/var/lib/postgresql/data
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init.sh
    networks:
      - postgres_demo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_demo_data:

networks:
  traefik_public:
    name: demo-traefik_public
    external: true
  postgres_demo:
    name: demo-postgres_demo
    driver: bridge
