x-api-base: &api-base
  networks:
    - traefik_public
    - postgres_demo
  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped

# Шаблон для веб-сервисов с защитой
x-traefik-web: &traefik-web
  traefik.enable: "true"
  traefik.http.routers.${PROJECT_NAME}-web.rule: "Host(`${PROJECT_DOMAIN}`)"
  traefik.http.routers.${PROJECT_NAME}-web.entrypoints: "websecure"
  traefik.http.routers.${PROJECT_NAME}-web.tls.certresolver: "letsencrypt"
  traefik.http.routers.${PROJECT_NAME}-web.middlewares: "demo-auth@docker"
  traefik.http.services.${PROJECT_NAME}-web.loadbalancer.server.port: "3000"

# Шаблон для API с защитой
x-traefik-api: &traefik-api
  traefik.enable: "true"
  traefik.http.routers.${PROJECT_NAME}-api.rule: "Host(`api.${PROJECT_DOMAIN}`)"
  traefik.http.routers.${PROJECT_NAME}-api.entrypoints: "websecure"
  traefik.http.routers.${PROJECT_NAME}-api.tls.certresolver: "letsencrypt"
  traefik.http.routers.${PROJECT_NAME}-api.middlewares: "demo-auth@docker"
  traefik.http.services.${PROJECT_NAME}-api.loadbalancer.server.port: "3000"

services:
  # Глобальный Traefik
  traefik:
    image: traefik:latest
    container_name: demo-traefik
    command:
      - --log.level=INFO
      - --api.dashboard=true
      - --api.insecure=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --accesslog=true
      - --accesslog.filepath=/var/log/traefik/access.log
      - --accesslog.format=json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./acme.json:/letsencrypt/acme.json
      - ./logs/traefik:/var/log/traefik
    networks:
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.demo-auth.basicauth.users=${BASIC_AUTH_USER_HASH}"
      - "traefik.http.routers.traefik-dash.rule=Host(`traefik.${PROJECT_DOMAIN}`)"
      - "traefik.http.routers.traefik-dash.entrypoints=websecure"
      - "traefik.http.routers.traefik-dash.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dash.service=api@internal"
      - "traefik.http.routers.traefik-dash.middlewares=demo-auth"
    restart: unless-stopped

  # Глобальный Postgres
  postgres:
    image: postgres:latest
    container_name: demo-postgres
    command:
      - "postgres"
      - "-c"
      - "max_connections=20"
      - "-c"
      - "shared_buffers=64MB"
      - "-c"
      - "work_mem=2MB"
      - "-c"
      - "maintenance_work_mem=16MB"
      - "-c"
      - "effective_cache_size=128MB"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_MULTIPLE_DATABASES}
    volumes:
      - postgres_demo_data:/var/lib/postgresql
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init.sh
    networks:
      - postgres_demo
    healthcheck:
      # Указываем базу postgres явно (-d postgres), чтобы проверка не падала 
      # пока создаются пользовательские базы данных
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_demo_data:

networks:
  traefik_public:
    name: demo-traefik_public
    external: true
  postgres_demo:
    name: demo-postgres_demo
    external: true
